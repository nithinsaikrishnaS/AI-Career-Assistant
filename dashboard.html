<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Career Assistant</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        black: '#000000',
                        white: '#ffffff',
                    }
                }
            }
        }
    </script>
    <!-- React & Babel CDNs -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-white text-black min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const JobCard = ({ job, isRecommended }) => {
            const [isHidden, setIsHidden] = useState(false);

            const handleApply = async (e) => {
                e.preventDefault();
                const link = job.link;
                if (!link || link === "#" || link === "" || !link.startsWith('http')) {
                    alert("⚠️ Application link is currently unavailable for this role.");
                    return;
                }
                
                // Requirement 1 & 2: Track Activity
                try {
                    await fetch('/activity', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ job_id: job.id, type: 'apply' }),
                        credentials: 'include'
                    });
                } catch (e) { console.error("Activity tracking failed", e); }
                
                window.open(link, "_blank", "noopener,noreferrer");
            };

            const handleIgnore = async () => {
                try {
                    await fetch('/activity', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ job_id: job.id, type: 'ignore' }),
                        credentials: 'include'
                    });
                    setIsHidden(true);
                } catch (e) { console.error("Ignore failed", e); }
            };

            if (isHidden) return null;

            const getBadge = (score) => {
                if (score >= 85) return { text: "🔥 High Match", border: "border-black", bg: "bg-black text-white" };
                if (score >= 70) return { text: "⭐ Recommended", border: "border-gray-800", bg: "bg-gray-800 text-white" };
                return { text: "📌 Other", border: "border-gray-200", bg: "bg-gray-100 text-gray-400" };
            };

            const badge = getBadge(job.score);
            const keySkills = (job.matched_skills && job.matched_skills.length > 0) ? job.matched_skills : [];

            const getSourceLabel = (src) => {
                const s = src ? src.toLowerCase() : "";
                if (s.includes("internshala")) return { label: "Internshala", emoji: "🎓", bg: "bg-orange-50", text: "text-orange-600", border: "border-orange-100" };
                if (s.includes("freshersworld")) return { label: "Freshersworld", emoji: "🌐", bg: "bg-blue-50", text: "text-blue-600", border: "border-blue-100" };
                if (s.includes("wellfound")) return { label: "Startup (Wellfound)", emoji: "🚀", bg: "bg-indigo-50", text: "text-indigo-600", border: "border-indigo-100" };
                if (s.includes("indeed")) return { label: "Indeed", emoji: "🌐", bg: "bg-blue-50", text: "text-blue-600", border: "border-blue-100" };
                const isCompany = s.includes("company") || ["microsoft", "amazon", "siemens", "accenture", "infosys", "tcs", "wipro", "hcltech", "cognizant"].includes(s);
                if (isCompany) return { label: "Company Careers", emoji: "🏢", bg: "bg-emerald-50", text: "text-emerald-700", border: "border-emerald-100" };
                return { label: "Discovery Source", emoji: "🌐", bg: "bg-gray-50", text: "text-gray-500", border: "border-gray-200" };
            };

            const srcLabel = getSourceLabel(job.source);

            return (
                <div className={`bg-white border ${isRecommended ? 'border-gray-300 shadow-lg scale-[1.02]' : 'border-gray-100'} rounded-xl p-8 transition-all duration-300 flex flex-col gap-6`}>
                    <div className="flex justify-between items-start gap-4">
                        <div className="flex-1">
                            <h3 className="text-xl font-bold tracking-tight leading-tight mb-1">{job.title}</h3>
                            <div className="flex flex-col gap-1.5">
                                <p className="text-gray-500 text-sm font-semibold uppercase tracking-wider">{job.company}</p>
                                <div className={`inline-flex items-center gap-1.5 px-2 py-0.5 rounded text-[10px] font-black uppercase tracking-wider border ${srcLabel.bg} ${srcLabel.text} ${srcLabel.border} w-fit`}>
                                    <span>{srcLabel.emoji}</span>
                                    <span>{srcLabel.label}</span>
                                </div>
                            </div>
                        </div>
                        {badge && (
                            <span className={`text-[10px] font-black uppercase tracking-widest px-2.5 py-1.5 border-2 ${badge.border} ${badge.bg} rounded-full shrink-0`}>
                                {badge.text}
                            </span>
                        )}
                    </div>

                    <div className="bg-gray-50 rounded-lg p-5 border border-gray-100">
                        <div className="flex items-center gap-2 mb-3">
                            <span className="text-[10px] font-bold uppercase tracking-widest text-gray-400">Match Insights</span>
                            <div className="h-[1px] flex-1 bg-gray-200"></div>
                        </div>
                        <div className="flex flex-col gap-2">
                            {job.explanation && job.explanation.length > 0 ? job.explanation.slice(0, 3).map((exp, i) => (
                                <div key={i} className={`text-[10px] font-medium flex items-center gap-2 ${exp.includes('⚠️') ? 'text-red-500' : 'text-gray-600'}`}>
                                    <span className="shrink-0">{exp.includes('⚠️') ? '' : '✔'}</span>
                                    <span>{exp}</span>
                                </div>
                            )) : (
                                <div className="text-[10px] text-gray-300 italic">No specific insights available for this role</div>
                            )}
                            <div className="flex flex-wrap gap-1.5 mt-2 pt-2 border-t border-gray-100">
                                {keySkills.length > 0 ? keySkills.slice(0, 4).map((sk, i) => (
                                    <span key={i} className="text-[9px] bg-white border border-gray-200 px-2 py-0.5 rounded font-black uppercase tracking-wider text-gray-400">
                                        {sk}
                                    </span>
                                )) : null}
                            </div>
                        </div>
                    </div>

                    <div className="mt-auto flex items-end justify-between pt-2">
                        <div className="flex flex-col">
                            <div className="flex items-baseline gap-1">
                                <span className={`text-2xl font-black tracking-tighter ${isRecommended ? 'text-black' : 'text-gray-400'}`}>{job.score}</span>
                                <span className="text-xs font-bold text-gray-400">% Fit</span>
                            </div>
                            <div className="flex flex-col gap-0.5">
                                <span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest leading-none">{job.location}</span>
                                <span className="text-[10px] font-black uppercase tracking-[0.1em] text-black">🕒 {job.posted_at || "New"}</span>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <button 
                                onClick={handleIgnore}
                                className="p-3 border border-gray-100 rounded-xl hover:bg-red-50 hover:border-red-100 group transition-all"
                                title="Ignore this role"
                            >
                                <span className="text-gray-300 group-hover:text-red-500 text-xs font-bold uppercase tracking-widest">✕</span>
                            </button>
                            <button 
                                onClick={handleApply}
                                className="bg-black text-white px-8 py-3 rounded-xl text-sm font-bold hover:bg-gray-800 hover:-translate-y-0.5 active:translate-y-0 transition-all shadow-lg shadow-black/10"
                            >
                                Apply
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const Dashboard = () => {
            const [data, setData] = useState({ recommended_jobs: [], other_jobs: [], metrics: {} });
            const [health, setHealth] = useState(null);
            const [isLive, setIsLive] = useState(false);
            const [loading, setLoading] = useState(true);
            const [profileReady, setProfileReady] = useState(null);
            const [scanning, setScanning] = useState(false);
            const [activeFilter, setActiveFilter] = useState('all');

            const getFilterCategory = (src) => {
                const s = src ? src.toLowerCase() : "";
                if (s.includes("internshala")) return 'internships';
                if (s.includes("wellfound")) return 'startups';
                if (s.includes("freshersworld") || s.includes("indeed")) return 'platforms';
                const isCompany = s.includes("company") || ["microsoft", "amazon", "siemens", "accenture", "infosys", "tcs", "wipro", "hcltech", "cognizant"].includes(s);
                if (isCompany) return 'enterprise';
                return 'other';
            };

            const filterJobs = (jobs) => {
                if (!jobs || !Array.isArray(jobs)) return [];
                if (activeFilter === 'all') return jobs;
                return jobs.filter(j => getFilterCategory(j.source) === activeFilter);
            };

            // Safe JSON parser — handles empty bodies from Render cold starts
            const safeJson = async (res) => {
                const text = await res.text();
                return text ? JSON.parse(text) : {};
            };

            const fetchData = async () => {
                try {
                    const healthRes = await fetch('/health', { credentials: 'include' });
                    if (!healthRes.ok) { setIsLive(false); setLoading(false); return; }
                    const healthData = await safeJson(healthRes);
                    setHealth(healthData.metrics || {});
                    setIsLive(true);
                    
                    if (!healthData?.metrics?.profile_online) {
                        setProfileReady(false);
                        setLoading(false);
                        return;
                    }
                    setProfileReady(true);
                    
                    const res = await fetch(`/jobs?t=${Date.now()}`, { credentials: 'include' });
                    if (!res.ok) { setLoading(false); return; }
                    const json = await safeJson(res);
                    
                    // Safety: Ensure we always have arrays
                    const safeData = {
                        recommended_jobs: json.recommended_jobs || [],
                        other_jobs: json.other_jobs || [],
                        metrics: json.metrics || {}
                    };
                    
                    if (json.is_rescoring || json.is_scanning || (healthData?.metrics?.system_status && healthData.metrics.system_status !== 'Idle')) {
                        setScanning(true);
                        setTimeout(fetchData, 3000);
                    } else {
                        setScanning(false);
                    }
                    setData(safeData);
                } catch (err) {
                    console.error("Fetch Data Error:", err);
                    setIsLive(false);
                } finally {
                    setLoading(false);
                }
            };

            const triggerScan = async () => {
                setScanning(true);
                try {
                    await fetch('/trigger-scan', { 
                        method: 'POST', 
                        credentials: 'include'
                    });
                } catch (e) { console.error("Trigger scan failed:", e); }
                setTimeout(fetchData, 2000);
            };

            useEffect(() => { fetchData(); }, []);

            if (loading) return (
                <div className="flex flex-col items-center justify-center min-h-screen gap-6">
                    <div className="w-10 h-10 border-4 border-gray-100 border-t-black rounded-full animate-spin"></div>
                    <div className="text-center">
                        <p className="text-sm font-black uppercase tracking-[0.3em] mb-1">Synchronizing</p>
                        <p className="text-xs font-medium text-gray-400">Loading your AI career insights...</p>
                    </div>
                </div>
            );

            if (profileReady === false) return (
                <div className="flex flex-col items-center justify-center min-h-screen p-8 text-center gap-10">
                    <div className="max-w-md">
                        <h2 className="text-3xl font-black mb-4 italic tracking-tight">Onboarding Required</h2>
                        <div className="flex flex-col gap-4 items-center">
                            <a href="index.html" className="bg-black text-white px-10 py-4 rounded-xl text-sm font-bold shadow-xl shadow-black/10 transition-transform active:scale-95">
                                Re-upload Resume →
                            </a>
                            <a href="profile.html" className="text-gray-400 text-xs font-bold uppercase tracking-widest hover:text-black transition-colors">
                                Manually Configure Profile
                            </a>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="max-w-7xl mx-auto px-6 md:px-12 py-20 relative">
                    {scanning && (
                        <div className="fixed top-0 left-0 w-full bg-black text-white text-[10px] font-black uppercase tracking-[0.4em] py-3 text-center z-50 animate-pulse">
                            ⚡ Discovery Engine Active: Refreshing your matches...
                        </div>
                    )}
                    <header className="mb-24 flex flex-col md:flex-row justify-between items-start md:items-end gap-12 dashboard-header">
                        <div>
                            <span className="text-[10px] font-black uppercase tracking-[0.4em] text-gray-300 block mb-4 italic">Tiered discovery Ecosystem</span>
                            <h1 className="text-6xl font-black tracking-tighter mb-4 italic leading-tight">Your Career,<br/>Prioritized.</h1>
                            <div className="flex items-center gap-6 mt-8">
                                <button 
                                    onClick={triggerScan}
                                    disabled={scanning}
                                    className={`text-[10px] font-black font-bold uppercase tracking-widest px-6 py-3 rounded-full border-2 border-black transition-all ${scanning ? 'opacity-50 cursor-not-allowed' : 'hover:bg-black hover:text-white'}`}
                                >
                                    {scanning ? "🔍 SCANNING..." : "⚡ TRIGGER INSTANT SCAN"}
                                </button>
                                <div className="text-xs text-gray-400 font-medium flex items-center gap-3">
                                    <span>Last Discovery: {health?.last_scrape_time || 'Never'}</span>
                                    <span className="text-gray-200">|</span>
                                    <div className="flex items-center gap-2">
                                        <div className={`w-2 h-2 rounded-full ${health?.system_status !== 'Idle' ? 'bg-orange-400 animate-pulse' : 'bg-emerald-400'}`}></div>
                                        <span className="uppercase text-[9px] font-black tracking-widest text-black italic">
                                            System {health?.system_status || 'Offline'}
                                        </span>
                                    </div>
                                    <span className="text-gray-200">|</span>
                                    <a href="profile.html" className="text-black font-bold uppercase tracking-widest text-[9px] hover:underline underline-offset-4">Settings</a>
                                </div>
                            </div>
                        </div>
                        <div className="bg-gray-50 p-8 rounded-3xl border border-gray-100 text-right min-w-[340px]">
                            <p className="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-6">Production Health Status</p>
                            <div className="grid grid-cols-2 gap-x-10 gap-y-6">
                                <div>
                                    <span className="block text-2xl font-black tracking-tighter">{health?.total_jobs_in_db || 0}</span>
                                    <span className="text-[9px] uppercase font-bold text-gray-400">Total Scanned</span>
                                </div>
                                <div>
                                    <span className="block text-2xl font-black tracking-tighter">{health?.recommended_last_run || 0}</span>
                                    <span className="text-[9px] uppercase font-bold text-black italic">Rec matches</span>
                                </div>
                                <div>
                                    <span className="block text-lg font-black tracking-tighter">{health?.last_telegram_time ? health.last_telegram_time.split(' ')[1] : 'Never'}</span>
                                    <span className="text-[9px] uppercase font-bold text-gray-400">Last Alert</span>
                                </div>
                                <div>
                                    <span className={`block text-lg font-black tracking-tighter ${health?.scheduler_active ? 'text-emerald-500' : 'text-red-500'}`}>
                                        {health?.scheduler_active ? 'ACTIVE' : 'OFFLINE'}
                                    </span>
                                    <span className="text-[9px] uppercase font-bold text-gray-400">Scheduler</span>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* 🔍 FILTER BAR */}
                    <div className="flex flex-wrap items-center gap-3 mb-16">
                        {[
                            { id: 'all', label: 'All Jobs', icon: '✨' },
                            { id: 'enterprise', label: 'Enterprise', icon: '🏢' },
                            { id: 'internships', label: 'Internships', icon: '🎓' },
                            { id: 'platforms', label: 'Platforms', icon: '🌐' },
                            { id: 'startups', label: 'Startups', icon: '🚀' }
                        ].map(f => (
                            <button
                                key={f.id}
                                onClick={() => setActiveFilter(f.id)}
                                className={`flex items-center gap-2 px-5 py-2.5 rounded-full text-[11px] font-black uppercase tracking-widest transition-all border-2 ${
                                    activeFilter === f.id 
                                    ? 'bg-black text-white border-black shadow-lg shadow-black/10' 
                                    : 'bg-white text-gray-400 border-gray-100 hover:border-gray-300'
                                }`}
                            >
                                <span>{f.icon}</span>
                                <span>{f.label}</span>
                            </button>
                        ))}
                    </div>

                    {/* 🔥 SECTION: RECOMMENDED */}
                    <section className="mb-20">
                        <div className="flex items-center gap-4 mb-10">
                            <h2 className="text-3xl font-black italic tracking-tighter">🔥 Recommended for You</h2>
                            <div className="h-[2px] flex-1 bg-gray-100"></div>
                            <span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">{(data?.recommended_jobs || []).length} Results</span>
                        </div>
                        {filterJobs(data?.recommended_jobs).length === 0 ? (
                            <div className="bg-gray-50 border border-gray-100 rounded-3xl p-16 text-center italic text-gray-400">
                                {activeFilter === 'all' ? "No high-match roles found in the latest scan." : `No recommended roles matching '${activeFilter}' category.`}
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                                {filterJobs(data?.recommended_jobs).map((job, index) => (
                                    <JobCard key={index} job={job} isRecommended={true} />
                                ))}
                            </div>
                        )}
                    </section>

                    {/* 📌 SECTION: OTHER */}
                    <section>
                        <div className="flex items-center gap-4 mb-10">
                            <h2 className="text-3xl font-black italic tracking-tighter text-gray-300">📌 Other Opportunities</h2>
                            <div className="h-[2px] flex-1 bg-gray-50"></div>
                            <span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">{(data?.other_jobs || []).length} Results</span>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 opacity-70 hover:opacity-100 transition-opacity">
                            {filterJobs(data?.other_jobs).map((job, index) => (
                                <JobCard key={index} job={job} isRecommended={false} />
                            ))}
                        </div>
                        {filterJobs(data?.other_jobs).length === 0 && (
                            <div className="bg-gray-50 border border-gray-100 rounded-3xl p-16 text-center italic text-gray-400">
                                No additional roles found in this category.
                            </div>
                        )}
                    </section>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
